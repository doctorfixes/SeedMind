<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <meta name="description" content="SeedMind — an adaptive brainstorming companion powered by growth rings." />
  <title>SeedMind — Adaptive Brainstorming</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" role="application" aria-label="SeedMind brainstorming app">
    <header class="app-header" role="banner">
      <h1>🌱 SeedMind</h1>
      <p class="tagline">Your adaptive brainstorming companion</p>
    </header>

    <main class="app-main" role="main">
      <section
        class="chat-window"
        id="chatWindow"
        aria-live="polite"
        aria-atomic="false"
        aria-relevant="additions"
        aria-label="Conversation"
        tabindex="0"
      >
        <div class="message assistant" role="listitem">
          <span class="bubble" aria-label="SeedMind: Hello! I'm SeedMind. Tell me what you'd like to brainstorm today.">
            Hello! I'm SeedMind. Tell me what you'd like to brainstorm today. 🌱
          </span>
        </div>
      </section>

      <form class="input-row" id="inputForm" autocomplete="off" aria-label="Send a message">
        <label for="userInput" class="sr-only">Your brainstorm prompt</label>
        <textarea
          id="userInput"
          class="user-input"
          placeholder="What do you want to brainstorm?"
          rows="2"
          maxlength="4000"
          aria-describedby="charCount"
          required
        ></textarea>
        <button type="submit" class="send-btn" id="sendBtn" aria-label="Send message">
          <svg aria-hidden="true" focusable="false" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </form>
      <div id="charCount" class="char-count" aria-live="polite" aria-atomic="true"></div>
    </main>

    <footer class="app-footer" role="contentinfo">
      <small>SeedMind v1 &nbsp;·&nbsp; Powered by adaptive growth rings</small>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
